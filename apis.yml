name: Google Cloud Endpoints
description: >-
  Google Cloud Endpoints is an API management system that helps you secure,
  monitor, analyze, and set quotas on your APIs using the same infrastructure
  Google uses for its own APIs. Endpoints works with the Extensible Service Proxy
  (ESP) or ESPv2 to provide API management capabilities including authentication,
  monitoring, logging, and API key validation for APIs described using OpenAPI
  specifications. It supports APIs hosted on App Engine, GKE, Compute Engine, or
  any Docker-supported environment.
